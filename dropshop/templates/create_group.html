{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <h1 class="text-3xl font-black mb-8 gradient-text">Создать групповую покупку</h1>
    <form method="POST">
        <p class="mb-4">Выберите друзей для участия:</p>
        <div class="space-y-2 max-h-60 overflow-y-auto mb-6">
            {% for friend in friends %}
            <label class="flex items-center gap-3">
                <input type="checkbox" name="friends" value="{{ friend.id }}">
                <span>@{{ friend.username }}</span>
            </label>
            {% endfor %}
        </div>
        <button type="submit" class="w-full bg-[var(--accent)] py-3 rounded-lg font-bold neon-btn">Создать группу</button>
    </form>
</div>
{% endblock %}
