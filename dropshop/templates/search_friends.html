{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Результаты поиска</h1>
    {% for user in results %}
    <div class="flex items-center gap-4 mb-4 card-hover p-3 rounded-xl">
        <img src="{% if user.avatar_url %}{{ user.avatar_url }}{% else %}https://via.placeholder.com/40{% endif %}" class="w-10 h-10 rounded-full">
        <a href="/profile/{{ user.id }}">@{{ user.username }}</a>
        <a href="/add_friend/{{ user.id }}" class="ml-auto text-[var(--accent)]">Добавить в друзья</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
