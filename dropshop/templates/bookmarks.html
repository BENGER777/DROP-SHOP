{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-black mb-8 gradient-text">🔖 Закладки</h1>
    <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
        {% for post in posts %}
        <div class="break-inside-avoid card-hover rounded-2xl overflow-hidden slide-in" style="background: var(--card-bg); border: 1px solid var(--border);">
            <img src="{% if post.image_url %}{{ post.image_url }}{% else %}https://via.placeholder.com/400x300/1a1a1a/fff?text=DROP{% endif %}" class="w-full object-cover" style="max-height: 70vh;">
            <div class="p-4">
                <div class="flex justify-between items-start">
                    <a href="/profile/{{ post.user_id }}" class="text-sm font-semibold" style="color: var(--accent);">@{{ post.username }}</a>
                </div>
                <p class="mt-2 text-sm">{{ post.description }}</p>
                <div class="mt-3 flex items-center justify-between text-sm">
                    <div class="flex items-center space-x-3">
                        <span>❤️ {{ post.likes_count }}</span>
                        <span>💬 {{ post.comments_count }}</span>
                    </div>
                    <span class="opacity-50 text-xs">{{ post.created_at[:10] }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
