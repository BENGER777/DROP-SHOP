{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-20">
    <h1 class="text-4xl font-black mb-8 gradient-text text-center">Выберите размер</h1>
    <div class="card-hover rounded-2xl p-6" style="background: var(--card-bg); border: 1px solid var(--border);">
        <p class="font-bold text-xl mb-4">{{ product.name }}</p>
        <form method="POST">
            {% if sizes %}
            <div class="mb-4">
                <label class="block text-sm mb-2">Размер</label>
                <select name="size" required class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">
                    {% for s in sizes %}
                    <option value="{{ s }}">{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <div class="mb-4">
                <label class="block text-sm mb-2">Количество</label>
                <input type="number" name="quantity" value="1" min="1" class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">
            </div>
            <button type="submit" class="w-full bg-[var(--accent)] py-3 rounded-lg font-bold">Добавить в корзину</button>
        </form>
    </div>
</div>
{% endblock %}
