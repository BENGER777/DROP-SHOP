{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Жалобы</h1>
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-x-auto">
        <table class="w-full text-sm">
            <thead><tr class="border-b border-gray-800"><th class="p-4">Пост</th><th class="p-4">Отправитель</th><th class="p-4">Причина</th><th class="p-4">Дата</th><th class="p-4">Действия</th></tr></thead>
            <tbody>
                {% for r in reports %}
                <tr class="border-b border-gray-800">
                    <td class="p-4">{{ r.post_desc[:50] }}</td>
                    <td class="p-4">@{{ r.reporter_name }}</td>
                    <td class="p-4">{{ r.reason }}</td>
                    <td class="p-4">{{ r.created_at[:10] }}</td>
                    <td class="p-4">
                        <form method="POST" action="/admin/reports/{{ r.id }}/action" class="flex gap-2">
                            <input type="hidden" name="action" value="delete">
                            <button class="bg-red-600 px-3 py-1 rounded text-xs">Удалить пост</button>
                        </form>
                        <form method="POST" action="/admin/reports/{{ r.id }}/action" class="flex gap-2 mt-1">
                            <input type="hidden" name="action" value="dismiss">
                            <button class="bg-gray-600 px-3 py-1 rounded text-xs">Отклонить</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
