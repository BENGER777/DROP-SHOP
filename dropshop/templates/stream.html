{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="card-hover rounded-2xl overflow-hidden" style="background: var(--card-bg); border: 1px solid var(--border);">
        <div class="p-4 flex items-center gap-4">
            {% if stream.avatar_url %}
            <img src="{{ stream.avatar_url }}" class="w-10 h-10 rounded-full">
            {% else %}
            <div class="w-10 h-10 bg-[var(--accent)] rounded-full flex items-center justify-center">{{ stream.username[0]|upper }}</div>
            {% endif %}
            <div>
                <h2 class="font-bold">{{ stream.title }}</h2>
                <p class="text-sm opacity-70">@{{ stream.username }}</p>
            </div>
        </div>
        {% if stream.video_url %}
        <video src="{{ stream.video_url }}" controls class="w-full max-h-96"></video>
        {% else %}
        <div class="h-96 bg-black flex items-center justify-center text-4xl">🎥</div>
        {% endif %}
        <!-- Чат эфира (заглушка) -->
        <div class="p-4">
            <h3 class="font-bold mb-2">Чат эфира</h3>
            <div class="h-32 overflow-y-auto bg-black/20 rounded-lg p-3 mb-2">
                <p class="text-sm">@user1: Крутой стрим!</p>
                <p class="text-sm">@user2: Покажи поближе</p>
            </div>
            <form class="flex gap-2">
                <input type="text" class="flex-1 bg-black border border-[var(--border)] rounded-lg px-3 py-2" placeholder="Сообщение...">
                <button type="submit" class="bg-[var(--accent)] px-4 py-2 rounded-lg">Отправить</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
