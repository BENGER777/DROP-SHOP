{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Оформление заказа</h1>
    
    <div class="card-hover rounded-2xl p-6 mb-8" style="background: var(--card-bg); border: 1px solid var(--border);">
        <h2 class="text-xl font-bold mb-4">Ваш заказ</h2>
        {% for item in items %}
        <div class="flex justify-between items-center py-2 border-b border-[var(--border)]">
            <span>{{ item.name }} x{{ item.quantity }}</span>
            <span class="font-bold">{{ item.price * item.quantity }} ₽</span>
        </div>
        {% endfor %}
        <div class="flex justify-between items-center pt-4">
            <span class="text-lg font-bold">Итого:</span>
            <span id="total-price" class="text-2xl font-black gradient-text">{{ total }} ₽</span>
        </div>
    </div>

    <form method="POST" class="card-hover rounded-2xl p-6" style="background: var(--card-bg); border: 1px solid var(--border);">
        <div class="mb-4">
            <label class="block text-sm mb-2">Адрес доставки</label>
            <input type="text" name="address" required class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">
        </div>
        <div class="mb-4">
            <label class="block text-sm mb-2">Контактный телефон или email</label>
            <input type="text" name="contact" required class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">
        </div>
        <div class="mb-4">
            <label class="block text-sm mb-2">Комментарий к заказу</label>
            <textarea name="comment" rows="2" class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3"></textarea>
        </div>
        <!-- Промокод -->
        <div class="mb-4">
            <label class="block text-sm mb-2">Промокод</label>
            <div class="flex gap-2">
                <input type="text" id="promo_code" name="promo_code" placeholder="Введите код" class="flex-1 bg-black border border-[var(--border)] rounded-lg px-4 py-3 uppercase">
                <button type="button" onclick="applyPromo()" class="bg-gray-700 px-4 py-3 rounded-lg font-bold hover:bg-gray-600">Применить</button>
            </div>
            <p id="promo-message" class="text-sm mt-1"></p>
        </div>
        <button type="submit" class="w-full bg-[var(--accent)] py-3 rounded-lg font-bold neon-btn">Подтвердить заказ</button>
    </form>
</div>

<script>
    let originalTotal = {{ total }};
    async function applyPromo() {
        const code = document.getElementById('promo_code').value.trim().toUpperCase();
        if (!code) return;
        const formData = new FormData();
        formData.append('code', code);
        try {
            const resp = await fetch('/apply_promo', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.error) {
                document.getElementById('promo-message').innerText = data.error;
                document.getElementById('total-price').innerText = originalTotal + ' ₽';
            } else {
                document.getElementById('promo-message').innerText = `Скидка: -${data.discount} ₽`;
                document.getElementById('total-price').innerText = data.new_total + ' ₽';
            }
        } catch(e) {
            console.error(e);
        }
    }
</script>
{% endblock %}
