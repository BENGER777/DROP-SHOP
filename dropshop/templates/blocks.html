{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Заблокированные пользователи</h1>
    <div class="space-y-3">
        {% for u in blocked %}
        <div class="card-hover rounded-xl p-4 flex items-center gap-4" style="background: var(--card-bg); border: 1px solid var(--border);">
            <img src="{% if u.avatar_url %}{{ u.avatar_url }}{% else %}https://via.placeholder.com/40{% endif %}" class="w-10 h-10 rounded-full">
            <span>@{{ u.username }}</span>
            <a href="/unblock/{{ u.id }}" class="ml-auto text-[var(--accent)]">Разблокировать</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
