{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Статистика продаж</h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
        <!-- График продаж по дням -->
        <div class="card-hover rounded-2xl p-6" style="background: var(--card-bg); border: 1px solid var(--border);">
            <h2 class="text-xl font-bold mb-4">Продажи за 7 дней</h2>
            <canvas id="salesChart" height="200"></canvas>
        </div>
        
        <!-- Топ-5 товаров -->
        <div class="card-hover rounded-2xl p-6" style="background: var(--card-bg); border: 1px solid var(--border);">
            <h2 class="text-xl font-bold mb-4">Топ-5 товаров</h2>
            <canvas id="topProductsChart" height="200"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    // Данные из Flask
    const salesDays = [{% for s in sales_data %}'{{ s.day[-5:] }}',{% endfor %}];
    const salesValues = [{% for s in sales_data %}{{ s.total }},{% endfor %}];
    const productNames = [{% for p in top_products %}'{{ p.name[:15] }}',{% endfor %}];
    const productValues = [{% for p in top_products %}{{ p.total }},{% endfor %}];

    // График продаж
    new Chart(document.getElementById('salesChart'), {
        type: 'bar',
        data: {
            labels: salesDays,
            datasets: [{
                label: 'Выручка (₽)',
                data: salesValues,
                backgroundColor: '#3B82F6',
                borderRadius: 8
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, ticks: { color: '#aaa' } }, x: { ticks: { color: '#aaa' } } }
        }
    });

    // Топ товаров
    new Chart(document.getElementById('topProductsChart'), {
        type: 'bar',
        data: {
            labels: productNames,
            datasets: [{
                label: 'Продано на сумму',
                data: productValues,
                backgroundColor: '#60A5FA',
                borderRadius: 8
            }]
        },
        options: {
            indexAxis: 'y',
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true, ticks: { color: '#aaa' } }, y: { ticks: { color: '#aaa' } } }
        }
    });
</script>
{% endblock %}
