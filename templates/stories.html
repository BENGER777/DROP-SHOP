{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-black mb-8 gradient-text">Истории</h1>
    <div class="flex gap-4 overflow-x-auto pb-4">
        {% for story in stories %}
        <a href="/story/{{ story.id }}" class="flex-shrink-0 w-20 text-center">
            <div class="w-20 h-20 rounded-full border-2 border-[var(--accent)] p-1 mx-auto">
                {% if story.avatar_url %}
                <img src="{{ story.avatar_url }}" class="w-full h-full rounded-full object-cover">
                {% else %}
                <div class="w-full h-full bg-[var(--accent)] rounded-full flex items-center justify-center text-lg font-bold">{{ story.username[0]|upper }}</div>
                {% endif %}
            </div>
            <p class="text-xs mt-1 truncate">@{{ story.username }}</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
