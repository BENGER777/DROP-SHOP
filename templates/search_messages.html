{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-black mb-8 gradient-text">Поиск по сообщениям</h1>
    <form method="GET" action="/messages/search" class="flex gap-2 mb-8">
        <input type="text" name="q" value="{{ query }}" placeholder="Введите текст..." class="flex-1 bg-[var(--card-bg)] border border-[var(--border)] rounded-lg px-4 py-3">
        <button type="submit" class="bg-[var(--accent)] px-6 py-3 rounded-lg font-bold">Найти</button>
    </form>
    <div class="space-y-3">
        {% for msg in results %}
        <div class="card-hover rounded-xl p-4" style="background: var(--card-bg); border: 1px solid var(--border);">
            <p class="text-xs opacity-70">@{{ msg.sender_name }} → @{{ msg.receiver_name }} | {{ msg.created_at[:16] }}</p>
            <p class="mt-1">{{ msg.content }}</p>
            <a href="/chat/{{ msg.sender_id if msg.sender_id != session.user_id else msg.receiver_id }}" class="text-[var(--accent)] text-sm">Перейти в чат</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
