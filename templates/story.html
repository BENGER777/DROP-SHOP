{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto px-4 py-8 text-center">
    <div class="card-hover rounded-2xl overflow-hidden" style="background: var(--card-bg); border: 1px solid var(--border);">
        <div class="p-4 flex items-center gap-3">
            {% if story.avatar_url %}
            <img src="{{ story.avatar_url }}" class="w-10 h-10 rounded-full">
            {% else %}
            <div class="w-10 h-10 bg-[var(--accent)] rounded-full flex items-center justify-center">{{ story.username[0]|upper }}</div>
            {% endif %}
            <span class="font-bold">@{{ story.username }}</span>
        </div>
        {% if story.video_url %}
        <video src="{{ story.video_url }}" controls autoplay class="w-full max-h-96 object-cover"></video>
        {% elif story.image_url %}
        <img src="{{ story.image_url }}" class="w-full max-h-96 object-cover">
        {% endif %}
        <p class="p-4 text-sm opacity-50">Исчезнет через 24 часа</p>
    </div>
</div>
{% endblock %}
