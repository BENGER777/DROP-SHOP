{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-20">
    <h1 class="text-4xl font-black mb-8 gradient-text text-center">Редактировать пост</h1>
    <form method="POST" class="card-hover rounded-2xl p-8" style="background: var(--card-bg); border: 1px solid var(--border);">
        <div class="mb-6">
            <label class="block text-sm mb-2">Описание</label>
            <textarea name="description" rows="4" required class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">{{ post.description }}</textarea>
        </div>
        <button type="submit" class="w-full bg-[var(--accent)] py-3 rounded-lg font-bold neon-btn">Сохранить</button>
    </form>
</div>
{% endblock %}
