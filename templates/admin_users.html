{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-black mb-8 gradient-text">Управление пользователями</h1>
    
    <div class="bg-gray-900 rounded-xl border border-gray-800 overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-gray-800">
                    <th class="text-left p-4">ID</th>
                    <th class="text-left p-4">Имя</th>
                    <th class="text-left p-4">Роль</th>
                    <th class="text-left p-4">Бонусы</th>
                    <th class="text-left p-4">Сменить роль</th>
                    <th class="text-left p-4">Начислить бонусы</th>
                    <th class="text-left p-4">Профиль</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr class="border-b border-gray-800">
                    <td class="p-4">{{ user.id }}</td>
                    <td class="p-4 font-bold">@{{ user.username }}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded text-xs {% if user.role == 'admin' %}bg-yellow-600{% else %}bg-gray-600{% endif %}">
                            {{ user.role }}
                        </span>
                    </td>
                    <td class="p-4">{{ user.points }}</td>
                    <td class="p-4">
                        <form method="POST" action="/admin/users/role/{{ user.id }}" class="flex gap-1">
                            <select name="role" class="bg-black border border-gray-700 rounded px-2 py-1 text-xs">
                                <option value="user" {% if user.role == 'user' %}selected{% endif %}>user</option>
                                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>admin</option>
                            </select>
                            <button type="submit" class="bg-[var(--accent)] px-3 py-1 rounded text-xs">OK</button>
                        </form>
                    </td>
                    <td class="p-4">
                        <form method="POST" action="/admin/users/bonus/{{ user.id }}" class="flex gap-1">
                            <input type="number" name="amount" placeholder="Сумма" min="1" class="w-16 bg-black border border-gray-700 rounded px-2 py-1 text-xs">
                            <button type="submit" class="bg-[var(--accent)] px-3 py-1 rounded text-xs">+</button>
                        </form>
                    </td>
                    <td class="p-4">
                        <a href="/profile/{{ user.id }}" class="text-[var(--accent)]">👤</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
