{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-20">
    <h1 class="text-4xl font-black mb-8 gradient-text text-center">Новый эфир</h1>
    <form method="POST" enctype="multipart/form-data" class="card-hover rounded-2xl p-6" style="background: var(--card-bg); border: 1px solid var(--border);">
        <div class="mb-4">
            <label class="block text-sm mb-2">Название</label>
            <input type="text" name="title" required class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3">
        </div>
        <div class="mb-6">
            <label class="block text-sm mb-2">Видео (запись эфира)</label>
            <input type="file" name="video" accept="video/*" class="w-full bg-black border border-[var(--border)] rounded-lg px-4 py-3 text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-[var(--accent)] file:text-white">
        </div>
        <button type="submit" class="w-full bg-[var(--accent)] py-3 rounded-lg font-bold">Начать эфир</button>
    </form>
</div>
{% endblock %}
